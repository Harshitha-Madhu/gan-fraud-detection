<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport"
          content="width=device-width, initial-scale=1.0">

    <title>GAN-Based Fraud Detection System</title>

    <style>

        body{
            font-family: Arial, sans-serif;
            text-align:center;
            margin-top:50px;
        }

        textarea{
            width:80%;
            max-width:700px;
            padding:10px;
        }

        button{
            padding:10px 20px;
            font-size:16px;
            cursor:pointer;
        }

        #result{
            margin-top:20px;
            font-size:20px;
            font-weight:bold;
        }

    </style>

</head>

<body>

    <h1>
        GAN-Based Fraud Detection System
    </h1>

    <p>
        Enter 30 transaction values separated by commas
    </p>

    <textarea
        id="inputData"
        rows="6"
        placeholder="22.28,15.13,13.48,1674.2,...">
    </textarea>

    <br><br>

    <button onclick="predictFraud()">
        Predict
    </button>

    <div id="result"></div>

<script>

async function predictFraud(){

try{

let values =
document.getElementById(
"inputData"
)
.value
.split(",")
.map(
x => parseFloat(x.trim())
);

if(values.length!==30){

document.getElementById(
"result"
).innerText=
"Please enter exactly 30 values";

return;

}

const response =
await fetch(
"/predict",
{
method:"POST",

headers:{
"Content-Type":
"application/json"
},

body:JSON.stringify({
features:values
})
}
);

const data =
await response.json();

if(data.error){

document.getElementById(
"result"
).innerText=
"Error: "+
data.error;

}
else{

document.getElementById(
"result"
).innerText=
"Prediction: "+
data.prediction+
" | Probability: "+
data.fraud_probability;

}

}

catch(error){

document.getElementById(
"result"
).innerText=
"Error connecting to server";

}

}

</script>

</body>
</html>
